name: synex_tournament
description: Synex Tournament - The Arena for Champions
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  firebase_database: ^10.4.0
  firebase_messaging: ^14.7.10
  firebase_storage: ^11.6.0
  
  # Google Sign In
  google_sign_in: ^6.2.1
  
  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  lottie: ^3.0.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.66.2
  
  # Utils
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.3
  image_picker: ^1.0.7
  permission_handler: ^11.2.0
  flutter_local_notifications: ^16.3.2
  intl: ^0.19.0
  uuid: ^4.3.3
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Regular.ttf
        - asset: assets/fonts/Orbitron-Bold.ttf
          weight: 700
        - asset: assets/fonts/Orbitron-Black.ttf
          weight: 900
