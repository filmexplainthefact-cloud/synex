workflows:
  android-release:
    name: Synex APK
    max_build_duration: 60
    working_directory: synex_flutter
    environment:
      flutter: 3.19.6    # ← STABLE OLD VERSION
      java: 17
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - filmexplainthefact@gmail.com
        notify:
          success: true
          failure: true
