workflows:
  android-release:
    name: Synex APK
    max_build_duration: 60
    working_directory: synex_flutter
    environment:
      flutter: 3.22.0
      java: 17
    scripts:
      - name: Flutter pub get
        script: |
          echo "flutter.sdk=$(which flutter | xargs dirname | xargs dirname)" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          flutter pub get
      - name: Build APK
        script: flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - filmexplainthefact@gmail.com
        notify:
          success: true
          failure: true
