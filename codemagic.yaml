workflows:
  android-release:
    name: Synex APK
    max_build_duration: 60
    working_directory: synex_flutter
    environment:
      flutter: 3.22.0
      java: 17
    scripts:
      - name: Flutter pub get
        script: |
          echo "flutter.sdk=$(which flutter | xargs dirname | xargs dirname)" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          flutter pub get

      - name: Download Fonts
        script: |
          mkdir -p assets/fonts
          curl -L "https://github.com/google/fonts/raw/main/ofl/orbitron/Orbitron%5Bwght%5D.ttf" -o assets/fonts/Orbitron-Regular.ttf
          cp assets/fonts/Orbitron-Regular.ttf assets/fonts/Orbitron-Bold.ttf
          cp assets/fonts/Orbitron-Regular.ttf assets/fonts/Orbitron-Black.ttf

      - name: Add google-services.json
        script: |
          cat > android/app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "93914740482",
              "firebase_url": "https://dgsell-default-rtdb.firebaseio.com",
              "project_id": "dgsell",
              "storage_bucket": "dgsell.firebasestorage.app"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:93914740482:android:d41f8492e8db7f071e741b",
                  "android_client_info": {
                    "package_name": "com.synex.synex_live"
                  }
                },
                "oauth_client": [
                  {
                    "client_id": "93914740482-bovs2ucih60opm1k324pf2deqgmi2pfq.apps.googleusercontent.com",
                    "client_type": 3
                  }
                ],
                "api_key": [
                  {
                    "current_key": "AIzaSyDjN72zb90c8GzasTiFx-wZHKk_XbL2XPw"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": [
                      {
                        "client_id": "93914740482-bovs2ucih60opm1k324pf2deqgmi2pfq.apps.googleusercontent.com",
                        "client_type": 3
                      }
                    ]
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Build APK
        script: flutter build apk --release --no-tree-shake-icons

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - filmexplainthefact@gmail.com
        notify:
          success: true
          failure: true
